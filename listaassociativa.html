<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <title>Lista associativa</title>
</head>
<body>
    <h1>Deuses gregos</h1>
    <dl>
        <div>
            <dt>Atena</dt>
            <dd>Deusa grega da sabedoria, estratégia de guerra, justiça e artes.</dd>
        </div>
        <div>
            <dt>Apolo</dt>
            <dd>Deus do Sol, da luz, da música, poesia, cura, profecia e artes.</dd>
        </div>
        <div>
            <dt>Dionísio</dt>
            <dd>Deus grego do vinho, das festas, da fertilidade, da loucura e do teatro.</dd>
        </div>
    </dl>
</body>
</html>
